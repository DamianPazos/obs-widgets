appId: com.damianpazos.obs-widgets
productName: OBS Widgets
directories:
  output: release
  buildResources: assets

# El main ya viene bundleado (tsup). La única dependencia de producción es
# @ngrok/ngrok (módulo nativo), que electron-builder incluye automáticamente.
files:
  - dist/**
  - package.json

# El binario nativo de ngrok (.node) no puede ir dentro del asar: se desempaqueta.
asarUnpack:
  - '**/*.node'
  - '**/@ngrok/**'

# El frontend de widgets y los íconos van como recursos junto al ejecutable.
extraResources:
  - from: ../widgets/dist
    to: widgets
  - from: assets
    to: assets

# Auto-update: los instaladores se publican en las Releases de GitHub.
publish:
  provider: github
  owner: DamianPazos
  repo: obs-widgets

win:
  target: nsis
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  perMachine: false
