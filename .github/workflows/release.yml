name: Release (desktop)

# Publica el instalador de la app de escritorio en las Releases de GitHub
# cuando se empuja un tag v* (ej. v0.2.0). El auto-update de la app lo detecta.
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build & publish installer
        run: pnpm --filter @obs-widgets/desktop release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
