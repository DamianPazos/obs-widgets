name: 🐛 Reporte de bug
description: Algo no funciona como debería
labels: [bug]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: ¿Qué pasó?
      description: Describí el problema y qué esperabas que pasara.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Pasos para reproducir
      placeholder: |
        1. Abrí el widget '...'
        2. Hice '...'
        3. Vi el error '...'
    validations:
      required: true
  - type: input
    id: widget
    attributes:
      label: Widget afectado
      placeholder: follower-alert
  - type: textarea
    id: env
    attributes:
      label: Entorno
      placeholder: OS, versión de OBS, navegador, Node/pnpm...
